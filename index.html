<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>1. FC Engelsbrand e.V. – Mitgliedsantrag</title>
  <meta http-equiv="refresh" content="0; url=frontend/mitgliedsantrag/">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #fff, #fff0f1);
      color: #111827;
    }
    .card {
      width: min(520px, calc(100% - 32px));
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 22px;
      padding: 32px;
      box-shadow: 0 20px 70px rgba(17,24,39,.12);
      text-align: center;
    }
    .badge {
      display: inline-grid;
      place-items: center;
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: #e30613;
      color: white;
      font-weight: 900;
      font-size: 22px;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      letter-spacing: -.04em;
    }
    p {
      color: #6b7280;
      margin-bottom: 22px;
    }
    a {
      display: inline-block;
      background: #e30613;
      color: white;
      text-decoration: none;
      padding: 13px 18px;
      border-radius: 12px;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">FCE</div>
    <h1>1. FC Engelsbrand e.V.</h1>
    <p>Du wirst automatisch zum digitalen Mitgliedsantrag weitergeleitet.</p>
    <a href="frontend/mitgliedsantrag/">Mitgliedsantrag öffnen</a>
  </main>
</body>
</html>
